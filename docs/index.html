<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kids' Schedule</title>
  <style>
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --text: #202124;
      --text-secondary: #5f6368;
      --border: #e0e0e0;
      --accent: #1a73e8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 0;
    }
    .header {
      background: var(--accent);
      color: white;
      padding: 1.5rem 1rem;
      text-align: center;
    }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .header .subtitle {
      font-size: 0.85rem;
      opacity: 0.85;
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .stats .stat-value {
      font-weight: 600;
      color: var(--text);
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 1rem;
    }
    .week {
      margin-bottom: 1.5rem;
    }
    .week h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.75rem;
      padding-bottom: 0.25rem;
      border-bottom: 2px solid var(--border);
    }
    .event-card {
      background: var(--surface);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }
    .event-date {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .event-name {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 0.15rem 0 0.35rem;
    }
    .event-details {
      font-size: 0.85rem;
      color: var(--text-secondary);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem;
    }
    .badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.1rem 0.5rem;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .event-meta {
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin-top: 0.3rem;
      opacity: 0.75;
    }
    .child { font-weight: 500; }
    .undated-note {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
      font-style: italic;
    }
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-secondary);
    }
    .footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --surface: #2d2d2d;
        --text: #e8eaed;
        --text-secondary: #9aa0a6;
        --border: #3c4043;
        --accent: #8ab4f8;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Kids' Schedule</h1>
    <div class="subtitle">Updated April 13, 2026</div>
  </div>
  <div class="stats">
    <div><span class="stat-value">0</span> events</div>
    <div><span class="stat-value">60</span> day lookback</div>
  </div>
  <div class="container">
    <section class="empty-state">
      <p>No upcoming kids' events were found in the last 60 days of email.</p>
    </section>

  </div>
  <div class="footer">
    Auto-generated from Gmail &middot; Updated every Monday
    <br><a href="archive.html" style="color:var(--accent);">View past schedules</a>
  </div>
</body>
</html>
