name: Kids Schedule Weekly

on:
  # Every Monday at 6:30 AM Eastern (10:30 UTC)
  schedule:
    - cron: "30 10 * * 1"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Email lookback window (days)"
        required: false
        default: "60"
      dry_run:
        description: "Dry run (skip publishing)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  run-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync ignored events from Apps Script
        env:
          IGNORE_READ_SECRET: ${{ secrets.IGNORE_READ_SECRET }}
        run: |
          URL=$(cat ignore_webhook_url.txt 2>/dev/null || true)
          if [ -z "$URL" ] || [ -z "$IGNORE_READ_SECRET" ]; then
            echo "No webhook URL or IGNORE_READ_SECRET configured — skipping sync."
            exit 0
          fi
          TMP=$(mktemp)
          if curl -sSL --fail -o "$TMP" "${URL}?secret=${IGNORE_READ_SECRET}"; then
            if python -c "import json,sys; d=json.load(open('$TMP')); assert isinstance(d, list)" 2>/dev/null; then
              mv "$TMP" ignored_events.json
              COUNT=$(python -c "import json; print(len(json.load(open('ignored_events.json'))))")
              echo "Synced $COUNT ignored event(s) from Apps Script."
            else
              echo "Apps Script response was not a valid JSON list — keeping existing ignored_events.json."
              rm -f "$TMP"
            fi
          else
            echo "Fetch failed — keeping existing ignored_events.json."
            rm -f "$TMP"
          fi

      - name: Run kids schedule pipeline
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.lookback_days }}" != "" ]; then
            ARGS="$ARGS --lookback-days ${{ github.event.inputs.lookback_days }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python main.py $ARGS

      - name: Commit and push updated page
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git add docs/ .filter_audit.json future_events.json ignored_events.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update kids schedule — $(date -u +%Y-%m-%d)"
            git push
          fi
