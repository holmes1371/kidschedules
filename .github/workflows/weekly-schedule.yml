name: Kids Schedule Weekly

on:
  # Every Monday at 6:30 AM Eastern (10:30 UTC)
  schedule:
    - cron: "30 10 * * 1"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Email lookback window (days)"
        required: false
        default: "60"
      dry_run:
        description: "Dry run (skip publishing)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # needed to push future_events.json to the state branch
  pages: write      # needed to deploy to GitHub Pages
  id-token: write   # needed by actions/deploy-pages

# Allow only one concurrent deployment; cancel in-progress runs when a newer run starts.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository (main)
        uses: actions/checkout@v4

      - name: Restore future_events.json from state branch
        run: |
          # Clone the state branch into .state/ if it exists.
          # First-ever run: clone fails, we fall back to an empty dir.
          if git clone --branch state --depth 1 \
               "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
               .state 2>/dev/null; then
            echo "Cloned existing state branch."
          else
            echo "No state branch yet — first run."
            mkdir -p .state
          fi
          if [ -f .state/future_events.json ]; then
            cp .state/future_events.json future_events.json
            COUNT=$(python3 -c "import json; print(len(json.load(open('future_events.json'))))")
            echo "Restored future_events.json ($COUNT event(s))."
          else
            echo "No prior future_events.json — starting fresh."
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync ignored events from Apps Script
        env:
          IGNORE_READ_SECRET: ${{ secrets.IGNORE_READ_SECRET }}
        run: |
          URL=$(cat ignore_webhook_url.txt 2>/dev/null || true)
          if [ -z "$URL" ] || [ -z "$IGNORE_READ_SECRET" ]; then
            echo "No webhook URL or IGNORE_READ_SECRET configured — skipping sync."
            exit 0
          fi
          TMP=$(mktemp)
          if curl -sSL --fail -o "$TMP" "${URL}?secret=${IGNORE_READ_SECRET}"; then
            if python -c "import json,sys; d=json.load(open('$TMP')); assert isinstance(d, list)" 2>/dev/null; then
              mv "$TMP" ignored_events.json
              COUNT=$(python -c "import json; print(len(json.load(open('ignored_events.json'))))")
              echo "Synced $COUNT ignored event(s) from Apps Script."
            else
              echo "Apps Script response was not a valid JSON list — keeping existing ignored_events.json."
              rm -f "$TMP"
            fi
          else
            echo "Fetch failed — keeping existing ignored_events.json."
            rm -f "$TMP"
          fi

      - name: Run kids schedule pipeline
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.lookback_days }}" != "" ]; then
            ARGS="$ARGS --lookback-days ${{ github.event.inputs.lookback_days }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python main.py $ARGS

      - name: Save future_events.json back to state branch
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ ! -f future_events.json ]; then
            echo "No future_events.json produced — nothing to save."
            exit 0
          fi
          cd .state
          if [ ! -d .git ]; then
            # First run: initialise a fresh orphan repo pointed at origin/state.
            git init -q -b state
            git remote add origin \
              "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          fi
          cp ../future_events.json future_events.json
          git -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              add future_events.json
          if git diff --cached --quiet; then
            echo "future_events.json unchanged — no state commit needed."
          else
            git -c user.name="github-actions[bot]" \
                -c user.email="github-actions[bot]@users.noreply.github.com" \
                commit -m "Update future_events.json — $(date -u +%Y-%m-%d)"
            git push origin HEAD:state
            echo "Pushed updated future_events.json to state branch."
          fi

      - name: Upload Pages artifact
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    if: ${{ github.event.inputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
