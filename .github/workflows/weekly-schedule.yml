name: Kids Schedule Weekly

on:
  # Monday, Wednesday, and Saturday at 6:15 AM Eastern (10:15 UTC).
  # Cron runs in UTC and ignores DST, so summer (EDT) hits 6:15 AM on the
  # dot and winter (EST) runs an hour early at 5:15 AM — acceptable drift.
  # Split into two entries so the CREATE_DRAFT gate below can branch on the
  # exact cron string — Monday runs create a Gmail digest draft, Wed/Sat
  # runs do not. If you change either time, update the gate expression too.
  schedule:
    - cron: "15 10 * * 1"
    - cron: "15 10 * * 3,6"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Email lookback window (days)"
        required: false
        default: "60"
      dry_run:
        description: "Dry run (skip publishing)"
        required: false
        type: boolean
        default: false
      intentional_failure:
        description: "Intentional failure (tests Actions push notification)"
        required: false
        type: boolean
        default: false
      create_draft:
        description: "Create weekly Gmail digest draft (off by default for manual runs)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # needed to push events_state.json to the state branch
  pages: write      # needed to deploy to GitHub Pages
  id-token: write   # needed by actions/deploy-pages

# Allow only one concurrent deployment; cancel in-progress runs when a newer run starts.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository (main)
        uses: actions/checkout@v5

      - name: Restore persistent state from state branch
        run: |
          # Clone the state branch into .state/ if it exists.
          # First-ever run: clone fails, we fall back to an empty dir.
          if git clone --branch state --depth 1 \
               "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
               .state 2>/dev/null; then
            echo "Cloned existing state branch."
          else
            echo "No state branch yet — first run."
            mkdir -p .state
          fi
          # future_events.json is the LEGACY pre-cache event bank. It is
          # restored one final time so main.py can bootstrap events_state.json
          # from it on the first run after the retirement. After that run
          # events_state.json is authoritative; this block can be deleted
          # any time thereafter.
          if [ -f .state/future_events.json ]; then
            cp .state/future_events.json future_events.json
            COUNT=$(python3 -c "import json; print(len(json.load(open('future_events.json'))))")
            echo "Restored future_events.json ($COUNT event(s)) for one-time cache bootstrap."
          else
            echo "No prior future_events.json — cache bootstrap will be a no-op."
          fi
          if [ -f .state/events_state.json ]; then
            cp .state/events_state.json events_state.json
            COUNT=$(python3 -c "import json; d=json.load(open('events_state.json')); print(f\"{len(d.get('processed_messages',{}))} msg(s), {len(d.get('events',{}))} event(s)\")")
            echo "Restored events_state.json ($COUNT)."
          else
            echo "No prior events_state.json — cache starts empty."
          fi
          # prior_events.json drives the NEW-badge diff (#13). If absent
          # (first run, or state-branch rollback), process_events.py returns
          # new_ids=None and no badges render — graceful first-run degrade.
          if [ -f .state/prior_events.json ]; then
            cp .state/prior_events.json prior_events.json
            COUNT=$(python3 -c "import json; print(len(json.load(open('prior_events.json')).get('event_ids', [])))")
            echo "Restored prior_events.json ($COUNT event ID(s) from prior run)."
          else
            echo "No prior prior_events.json — NEW badges suppressed this run."
          fi
          # sender_stats.json carries the learned per-sender event-count
          # history (#17). If absent, newsletter_stats.load_stats returns an
          # empty stats object and no senders are classified as newsletters
          # on this run; promotion restarts from a clean slate.
          if [ -f .state/sender_stats.json ]; then
            cp .state/sender_stats.json sender_stats.json
            COUNT=$(python3 -c "import json; print(len(json.load(open('sender_stats.json')).get('senders', {})))")
            echo "Restored sender_stats.json ($COUNT sender(s) tracked)."
          else
            echo "No prior sender_stats.json — newsletter classifier starts empty."
          fi
          if [ -f .state/.filter_audit.json ]; then
            cp .state/.filter_audit.json .filter_audit.json
            echo "Restored .filter_audit.json."
          else
            echo "No prior .filter_audit.json — audit will run on this invocation."
          fi
          if [ -f .state/blocklist_auto.txt ]; then
            cp .state/blocklist_auto.txt blocklist_auto.txt
            COUNT=$(grep -cv -E '^(#|$)' blocklist_auto.txt || true)
            echo "Restored blocklist_auto.txt ($COUNT auto-blocked sender(s))."
          else
            echo "No prior blocklist_auto.txt — starting fresh."
          fi
          if [ -f .state/blocklist_auto_audit.jsonl ]; then
            cp .state/blocklist_auto_audit.jsonl blocklist_auto_audit.jsonl
            COUNT=$(wc -l < blocklist_auto_audit.jsonl || echo 0)
            echo "Restored blocklist_auto_audit.jsonl ($COUNT prior run(s) logged)."
          else
            echo "No prior blocklist_auto_audit.jsonl — starting fresh."
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync ignored events from Apps Script
        env:
          IGNORE_READ_SECRET: ${{ secrets.IGNORE_READ_SECRET }}
        run: |
          URL=$(cat ignore_webhook_url.txt 2>/dev/null || true)
          if [ -z "$URL" ] || [ -z "$IGNORE_READ_SECRET" ]; then
            echo "No webhook URL or IGNORE_READ_SECRET configured — skipping sync."
            exit 0
          fi
          TMP=$(mktemp)
          if curl -sSL --fail -o "$TMP" "${URL}?secret=${IGNORE_READ_SECRET}"; then
            if python -c "import json,sys; d=json.load(open('$TMP')); assert isinstance(d, list)" 2>/dev/null; then
              mv "$TMP" ignored_events.json
              COUNT=$(python -c "import json; print(len(json.load(open('ignored_events.json'))))")
              echo "Synced $COUNT ignored event(s) from Apps Script."
            else
              echo "Apps Script response was not a valid JSON list — keeping existing ignored_events.json."
              rm -f "$TMP"
            fi
          else
            echo "Fetch failed — keeping existing ignored_events.json."
            rm -f "$TMP"
          fi

      - name: Sync ignored senders from Apps Script
        env:
          IGNORE_READ_SECRET: ${{ secrets.IGNORE_READ_SECRET }}
        run: |
          URL=$(cat ignore_webhook_url.txt 2>/dev/null || true)
          if [ -z "$URL" ] || [ -z "$IGNORE_READ_SECRET" ]; then
            echo "No webhook URL or IGNORE_READ_SECRET configured — skipping sync."
            exit 0
          fi
          # Ephemeral: sync_ignored_senders.py writes ignored_senders.json to
          # the runner's working dir for this run only. Same pattern as the
          # ignored-events sync above — no commit back to main. On fetch
          # failure the helper exits 0 with no file written; downstream
          # consumers must handle a missing file gracefully.
          python scripts/sync_ignored_senders.py \
            --url "$URL" \
            --secret "$IGNORE_READ_SECRET" \
            --out ignored_senders.json

      - name: Run kids schedule pipeline
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Only the Monday cron — or an explicit manual opt-in — creates
          # a Gmail digest draft. Wed/Sat scheduled runs and every other
          # trigger leave this as "0" so testing/debug runs and the
          # mid-week refresh cadence cannot spam Ellen's drafts folder.
          # The '15 10 * * 1' literal must match the Monday schedule entry
          # above; if the Monday cron time is ever edited, update it here.
          CREATE_DRAFT: ${{ (github.event.schedule == '15 10 * * 1' || github.event.inputs.create_draft == 'true') && '1' || '0' }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.lookback_days }}" != "" ]; then
            ARGS="$ARGS --lookback-days ${{ github.event.inputs.lookback_days }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.intentional_failure }}" == "true" ]; then
            ARGS="$ARGS --intentional-failure"
          fi
          python main.py $ARGS

      - name: Save persistent state back to state branch
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ ! -f .filter_audit.json ] \
             && [ ! -f blocklist_auto.txt ] \
             && [ ! -f blocklist_auto_audit.jsonl ] \
             && [ ! -f events_state.json ] \
             && [ ! -f prior_events.json ] \
             && [ ! -f sender_stats.json ]; then
            echo "No persistent state produced — nothing to save."
            exit 0
          fi
          cd .state
          if [ ! -d .git ]; then
            # First run: initialise a fresh orphan repo pointed at origin/state.
            git init -q -b state
            git remote add origin \
              "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          fi
          if [ -f ../.filter_audit.json ]; then
            cp ../.filter_audit.json .filter_audit.json
          fi
          if [ -f ../blocklist_auto.txt ]; then
            cp ../blocklist_auto.txt blocklist_auto.txt
          fi
          if [ -f ../blocklist_auto_audit.jsonl ]; then
            cp ../blocklist_auto_audit.jsonl blocklist_auto_audit.jsonl
          fi
          if [ -f ../events_state.json ]; then
            cp ../events_state.json events_state.json
          fi
          if [ -f ../prior_events.json ]; then
            cp ../prior_events.json prior_events.json
          fi
          if [ -f ../sender_stats.json ]; then
            cp ../sender_stats.json sender_stats.json
          fi
          # Only 'git add' files that actually exist — any one of these may be
          # absent on a given run (e.g. first run before filter audit stamps).
          # future_events.json is intentionally NOT in this list — it was
          # retired in favor of events_state.json (see restore step).
          FILES=""
          [ -f .filter_audit.json ] && FILES="$FILES .filter_audit.json"
          [ -f blocklist_auto.txt ] && FILES="$FILES blocklist_auto.txt"
          [ -f blocklist_auto_audit.jsonl ] && FILES="$FILES blocklist_auto_audit.jsonl"
          [ -f events_state.json ] && FILES="$FILES events_state.json"
          [ -f prior_events.json ] && FILES="$FILES prior_events.json"
          [ -f sender_stats.json ] && FILES="$FILES sender_stats.json"
          git -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              add $FILES
          if git diff --cached --quiet; then
            echo "Persistent state unchanged — no commit needed."
          else
            git -c user.name="github-actions[bot]" \
                -c user.email="github-actions[bot]@users.noreply.github.com" \
                commit -m "Update persistent state — $(date -u +%Y-%m-%d)"
            git push origin HEAD:state
            echo "Pushed persistent state updates to state branch."
          fi

      - name: Upload Pages artifact
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/
          # v4 introduced a breaking change — hidden files are excluded from
          # the artifact by default. docs/.nojekyll must ship so GitHub Pages
          # skips Jekyll processing (required for docs/ics/*.ics routing and
          # any leading-underscore paths).
          include-hidden-files: true

  deploy:
    needs: build
    if: ${{ github.event.inputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
